spec_version: "1.0"
name: "cyberqa"
version: "1.0.0"
description: "CyberQA Legacy Ops"

entrypoint: "env.py"

env_spec:
  observation_type: "json"
  action_space:
    - "ls"
    - "cd"
    - "cat"
    - "decode"
    - "env"
    - "cp"
    - "chmod"
    - "rm"
    - "submit_flag"

evaluation:
  grader_file: "grader.py"
  baseline_file: "baseline.py"
  task_file: "task.py"

variables:
  - name: "API_BASE_URL"
    description: "LLM API Endpoint"
  - name: "MODEL_NAME"
    description: "Identifier of the model to be used"
  - name: "HF_TOKEN"
    description: "Hugging Face API token"