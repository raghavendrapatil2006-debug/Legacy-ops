tasks:
  - id: "phase_1"
    name: "Phase 1: Reconnaissance"
    description: "Analyze the virtual environment and extract the initial system signature."
    difficulty: "easy"
    score: 0.16
    grader: "grader:grade_phase_1"

  - id: "phase_2"
    name: "Phase 2: Cryptographic Reversal"
    description: "Locate and decode the obfuscated backup file."
