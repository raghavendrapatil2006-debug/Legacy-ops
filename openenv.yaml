  step: POST /step
  state: GET /state
  grader: POST /grader
  tasks: GET /tasks
  baseline: GET /baseline

baseline_scores:
  phase_1: 0.80
  phase_2: 0.82
  phase_3: 0.85
  phase_4: 0.87
  phase_5: 0.89
  phase_6: 0.91