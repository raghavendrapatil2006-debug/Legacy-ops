    score: 0.16
    grader: "grader:grade_phase_3"

  - id: "phase_4"
    name: "Phase 4: Integrity Restoration"
    description: "Identify corrupted web server configurations and restore from clean backups."
    difficulty: "medium"
    score: 0.16
    grader: "grader:grade_phase_4"

  - id: "phase_5"
    name: "Phase 5: System Hardening"
    description: "Modify file permissions on the shadow credential file to prevent unauthorized access."
    difficulty: "medium"
    score: 0.16
    grader: "grader:grade_phase_5"

  - id: "phase_6"
    name: "Phase 6: Threat Neutralization"
    description: "Locate and permanently delete the unauthorized sysupdater binary."
    difficulty: "hard"
    score: 0.16
    grader: "grader:grade_phase_6"